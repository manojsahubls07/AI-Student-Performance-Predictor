<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Academic Analytics System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">

<div class="container">

<a class="navbar-brand fw-bold" href="#">
🤖 AI Academic Analytics
</a>

<a href="/students" class="btn btn-outline-light">
Student Records
</a>

</div>

</nav>

<div class="container">

<div class="glass-card form-box">

<h1 class="title">
🎓 AI Student Performance Predictor
</h1>

<p class="subtitle">
Predict Academic Success Using Machine Learning
</p>

<form action="/predict" method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">
<i class="fas fa-user"></i>
 Student Name
</label>

<input
type="text"
name="name"
class="form-control"
placeholder="Enter Student Name"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
<i class="fas fa-clock"></i>
 Study Hours
</label>

<input
type="number"
step="0.1"
name="study_hours"
class="form-control"
placeholder="Daily Study Hours"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
<i class="fas fa-calendar-check"></i>
 Attendance %
</label>

<input
type="number"
step="0.1"
name="attendance"
class="form-control"
placeholder="Attendance Percentage"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
<i class="fas fa-tasks"></i>
 Assignments
</label>

<input
type="number"
name="assignments"
class="form-control"
placeholder="Assignments Submitted"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
<i class="fas fa-file-alt"></i>
 Quiz Score
</label>

<input
type="number"
step="0.1"
name="quiz"
class="form-control"
placeholder="Quiz Marks"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
<i class="fas fa-graduation-cap"></i>
 Internal Marks
</label>

<input
type="number"
step="0.1"
name="internal_marks"
class="form-control"
placeholder="Internal Assessment Marks"
required>

</div>

</div>

<button
type="submit"
class="btn btn-custom w-100 text-white">

<i class="fas fa-chart-line"></i>
 Predict Performance

</button>

</form>

</div>

</div>

</body>

</html>
